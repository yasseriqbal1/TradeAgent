name: Build and publish Docker images

on:
  push:
    branches: ["main"]
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push dashboard image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/dashboard.Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/tradeagent-dashboard:latest
            ghcr.io/${{ github.repository_owner }}/tradeagent-dashboard:${{ github.sha }}

      - name: Build and push bot image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/bot.Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/tradeagent-bot:latest
            ghcr.io/${{ github.repository_owner }}/tradeagent-bot:${{ github.sha }}
